# Repo: TheKing.Hippopotamus — deploy Next app from Portfolio-Platform/
# Secret VERCEL = Vercel deployment token.
name: Deploy TheKing.Hippopotamus (Vercel)

on:
  push:
    branches: [main, master]
    paths:
      - "Portfolio-Platform/**"
      - ".github/workflows/deploy-vercel.yml"
  workflow_dispatch:

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: Portfolio-Platform

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Portfolio-Platform/package-lock.json

      - run: npm ci

      - name: Deploy production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL }}
          VERCEL_TEAM_SLUG: ${{ secrets.VERCEL_TEAM_SLUG }}
        run: |
          set -e
          SCOPE="${VERCEL_TEAM_SLUG:-kinghippos-projects}"
          npx vercel@latest deploy --prod --yes \
            --token "$VERCEL_TOKEN" \
            --scope "$SCOPE"
